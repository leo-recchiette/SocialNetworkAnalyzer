# docker-compose for the SNA tool.
#
#   docker compose up --build      # build the app image and start everything
#   open http://localhost:8080     # the application
#
# Services:
#   app      PHP 7.4 + Python 2.7 (this repo's Dockerfile)   -> http://localhost:8080
#   neo4j    Neo4j 3.5 + APOC (graph store + Bolt + Browser)  -> http://localhost:7474
#   mysql    MySQL 5.7 (users + word_frequency tables)        -> localhost:3306
#   adminer  optional web UI for the MySQL side               -> http://localhost:8081
#
# The passwords here are DEV defaults. If you change NEO4J_PASSWORD you must
# ALSO edit static/visualization/graphVisualization/graphVisualization.js
# (server_password): that value is shipped to the browser, which connects to
# Neo4j directly over Bolt and cannot read these environment variables.

services:
  app:
    # neo4j:3.5 and mysql:5.7 ship no arm64 manifests, and the app's Python 2.7
    # scientific wheels (numpy/scipy/pandas/scikit-learn) are x86_64-only — the
    # image has no C/Fortran toolchain to build them from source. So every
    # service is pinned to linux/amd64; on Apple Silicon it runs under emulation.
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sna_app
    ports:
      - "8080:80"
    environment:
      # Consumed by server/dbConnector.py
      NEO4J_HOST: neo4j
      NEO4J_PORT: "7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: snapassword
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: snapassword
      MYSQL_DATABASE: sna_tool
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    platform: linux/amd64
    image: neo4j:3.5
    container_name: sna_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt — the browser's neovis.js connects to bolt://localhost:7687
    environment:
      NEO4J_AUTH: "neo4j/snapassword"
      # Auto-download APOC on first boot (needs outbound internet that one time).
      NEO4JLABS_PLUGINS: '["apoc"]'
      # Allow APOC procedures (the FB dumper calls apoc.refactor.mergeNodes).
      # Single '_' -> '.', '__' -> '_'; write '*' literally (no backslash) in compose.
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_whitelist: "apoc.*"
      # Make Bolt reachable from the host (for the browser).
      NEO4J_dbms_connector_bolt_listen__address: "0.0.0.0:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p snapassword 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s   # APOC download + DB warmup on first boot
    restart: unless-stopped

  mysql:
    platform: linux/amd64
    image: mysql:5.7
    container_name: sna_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: snapassword
      MYSQL_DATABASE: sna_tool
    volumes:
      - mysql_data:/var/lib/mysql
      # *.sql here runs once, on first start with an empty data volume.
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psnapassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  adminer:
    platform: linux/amd64
    image: adminer:4
    container_name: sna_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_plugins:
  mysql_data:
