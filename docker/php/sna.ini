; PHP overrides for the SNA app (copied into the conf.d dir of the php image).

; The app uploads Facebook/Twitter zip dumps and .mbox files; README asks for 500M.
upload_max_filesize = 500M
post_max_size = 500M

; Dumps are parsed synchronously by Python via shell_exec, which can take a while.
memory_limit = 512M
max_execution_time = 900

; Keep notices/warnings out of the HTTP response body. server.php contains a few
; PHP7 by-reference notices (e.g. reset(explode(...))) whose harmless output would
; otherwise be concatenated into the AJAX responses the frontend parses.
display_errors = Off
